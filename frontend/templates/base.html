<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CineMatch - AI Content Intelligence{% endblock %}</title>
    <style>
        /* Refined minimal styles */
        :root{--bg:#0f1724;--card:#0b1220;--accent:#1e90ff;--muted:#9aa6b2}
        html,body{height:100%}
        body{font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif;margin:0;padding:0;background:linear-gradient(180deg,#071028 0%, #0f1b2a 100%);color:#e6eef6;display:flex;flex-direction:column}
        .navbar{background:transparent;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.03)}
        .navbar .logo{color:var(--accent);text-decoration:none;font-weight:700;font-size:18px}
        .main-content{max-width:820px;margin:32px auto;padding:20px;width:100%}
        .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:20px;box-shadow:0 6px 24px rgba(2,6,23,0.6)}
        .search-box{display:flex;gap:10px}
        .search-input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
        .search-btn{padding:10px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
        .results{margin-top:14px}
        .result-item{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.02);color:#dbeafe}
        footer.footer{color:var(--muted);text-align:center;padding:18px 0;font-size:13px}
        @media(max-width:600px){.main-content{margin:18px 12px}.search-box{flex-direction:column}.search-btn{width:100%}}
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="/" class="logo">
                    <i class="fas fa-play-circle"></i>
                    <span>CineMatch</span>
                </a>
            </div>
            <div class="navbar-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/search" class="nav-link">Search</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/watchlist" class="nav-link">Watchlist</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 CineMatch. All rights reserved.</p>
            <p>AI-powered content intelligence platform</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
