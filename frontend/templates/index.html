{% extends "base.html" %}

{% block title %}CineMatch - Home{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="main-content card">
        <h1 style="margin-top:0">CineMatch</h1>
        <p>Enter a movie title to get recommendations.</p>

        <div class="search-box">
            <input type="text" id="movieSearch" class="search-input" placeholder="Enter a movie title..." autocomplete="off">
            <button id="searchBtn" class="search-btn">Recommend</button>
        </div>

        <div id="recommendations-result" class="results"></div>
    </div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/recommendations.js') }}"></script>
<script>
    // Initialize with suggestions
    const suggestions = {{ suggestions|tojson }};
</script>
{% endblock %}
